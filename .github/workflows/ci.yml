name: Kothakhahon CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  validate:
    name: Lint, Test & Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci

      - name: Generate Prisma Client
        run: npx prisma generate

      - name: Check Linting
        run: npm run lint

      - name: Run Unit & Integration Tests
        run: npm test
        env:
          NODE_ENV: test
          SESSION_SECRET: ci-secret-key-12345-only-for-tests

      - name: Verify Production Compilation
        run: npm run build
        env:
          NEXT_PUBLIC_SITE_URL: http://localhost:3000
          DATABASE_URL: postgresql://postgres@localhost:5432/dummy
          DIRECT_URL: postgresql://postgres@localhost:5432/dummy
          SESSION_SECRET: build-secret-key-12345-only-for-builds
